name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test

  cypress-e2e:
    name: Cypress E2E (${{ matrix.group.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group:
          - name: Marketing & Auth
            command: npm run cypress:e2e:marketing
          - name: App Flows
            command: npm run cypress:e2e:app

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          start: npm run dev
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 120
          command: ${{ matrix.group.command }}
        env:
          AUTH0_DOMAIN: ci-example.auth0.com
          AUTH0_CLIENT_ID: ci-client-id
          AUTH0_CLIENT_SECRET: ci-client-secret
          AUTH0_SECRET: ci-test-secret-not-for-production
          APP_BASE_URL: http://localhost:3000
          JWT_SECRET: ci-test-secret-not-for-production
          POSTGRES_URL: postgresql://test:test@localhost:5432/testdb

  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
      
      - name: Run type check
        run: npm run type-check

  build:
    name: Build Application
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Next.js app
        run: npm run build
        env:
          # Dummy values for build-time checks (not used in runtime)
          JWT_SECRET: ci-test-secret-not-for-production
          POSTGRES_URL: postgresql://test@localhost/testdb
          NODE_ENV: production
